steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - buildx
      - build
      - --platform=linux/amd64
      - -t
      - us-west1-docker.pkg.dev/foodini-489420/foodtracker/app:latest
      - --load
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-west1-docker.pkg.dev/foodini-489420/foodtracker/app:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - foodtracker
      - --image=us-west1-docker.pkg.dev/foodini-489420/foodtracker/app:latest
      - --region=us-west1
      - --platform=managed

images:
  - us-west1-docker.pkg.dev/foodini-489420/foodtracker/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
